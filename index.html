<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#17212b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="新媒体作战台" />
  <link rel="icon" href="assets/account-avatar.jpg" />
  <link rel="apple-touch-icon" href="assets/account-avatar.jpg" />
  <title>养老院有群00后｜新媒体作战台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: "#17212b",
            line: "#d8dee8",
            mist: "#f6f8fb",
            coral: "#ef6f61",
            jade: "#1f9d8a",
            sun: "#f2b84b",
            sky: "#7fc7e8",
            cream: "#fff7e8",
            peach: "#ffe2c2"
          },
          boxShadow: {
            soft: "0 12px 30px rgba(23,33,43,.08)"
          }
        }
      }
    };
  </script>
  <style>
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #17212b;
      background: linear-gradient(180deg, #fff7e8 0, #f6f8fb 260px, #f6f8fb 100%);
    }
    input, select, textarea, button { font-size: 16px; }
    .tab-active {
      background: #17212b !important;
      color: #fff !important;
      border-color: #17212b !important;
    }
    .tab-btn { -webkit-tap-highlight-color: transparent; }
    .tab-btn:active, .tab-btn:focus { background: #17212b; color: #fff; border-color: #17212b; }
    .status-dot { width: 8px; height: 8px; border-radius: 999px; display: inline-block; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #c8d1dc; border-radius: 999px; }
    .safe-area { padding-bottom: env(safe-area-inset-bottom); }
    .bottom-nav-active { color: #17212b; font-weight: 700; }
    .brand-panel { background: linear-gradient(135deg, #fff7e8 0%, #ffffff 48%, #eaf7fc 100%); }
    .avatar-ring { box-shadow: 0 0 0 4px #fff, 0 10px 24px rgba(239,111,97,.20); }
    .glass-nav { backdrop-filter: saturate(160%) blur(12px); background: rgba(255,255,255,.86); }
    @media (max-width: 640px) {
      body { background: #f6f8fb; }
      input, select, textarea { min-height: 44px; }
      .mobile-hide-label .btn-label { display: none; }
      .mobile-card { border-radius: 10px; box-shadow: none; }
      .mobile-bottom-space { padding-bottom: calc(92px + env(safe-area-inset-bottom)); }
    }
    @media (min-width: 641px) {
      input, select, textarea, button { font-size: 14px; }
    }
  </style>
</head>
<body class="bg-mist min-h-screen">
  <div class="hidden bg-coral bg-sun bg-jade bg-ink bg-sky bg-cream bg-peach text-coral text-sun text-jade text-ink text-sky border-ink border-coral"></div>
  <div class="min-h-screen">
    <header class="glass-nav border-b border-line sticky top-0 z-30">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3">
        <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
          <div class="flex items-center gap-3">
            <img src="assets/account-avatar.jpg" alt="养老院00后头像" class="w-12 h-12 rounded-xl object-cover avatar-ring shrink-0" />
            <div>
              <h1 id="appTitle" class="text-lg sm:text-xl font-bold leading-tight">养老院有群00后｜新媒体作战台</h1>
              <p id="appSubtitle" class="text-xs sm:text-sm text-slate-500">热点发现 · 任务协作 · 数据复盘</p>
            </div>
          </div>
          <div class="flex flex-wrap items-center gap-2 mobile-hide-label">
            <button id="copyDailyFlowBtn" class="h-9 px-3 rounded-md border border-line bg-white hover:bg-slate-50 text-sm">
              <i class="fa fa-clipboard mr-1" aria-hidden="true"></i><span class="btn-label">复制流程</span>
            </button>
            <button id="exportJsonBtn" class="h-9 px-3 rounded-md border border-line bg-white hover:bg-slate-50 text-sm">
              <i class="fa fa-download mr-1" aria-hidden="true"></i><span class="btn-label">导出数据</span>
            </button>
            <label id="importJsonLabel" class="h-9 px-3 rounded-md border border-line bg-white hover:bg-slate-50 text-sm inline-flex items-center cursor-pointer">
              <i class="fa fa-upload mr-1" aria-hidden="true"></i><span class="btn-label">导入数据</span>
              <input id="importJsonInput" type="file" accept="application/json" class="hidden" />
            </label>
            <button id="seedBtn" class="h-9 px-3 rounded-md bg-coral text-white hover:opacity-90 text-sm">
              <i class="fa fa-magic mr-1" aria-hidden="true"></i><span class="btn-label">导入示例</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-3 sm:px-6 py-4 sm:py-5 safe-area mobile-bottom-space">
      <nav class="hidden sm:block mb-5 overflow-x-auto scrollbar-thin">
        <div id="tabs" class="flex gap-2 min-w-max"></div>
      </nav>

      <section id="view-dashboard" class="view space-y-5"></section>

      <section id="view-topics" class="view hidden space-y-5">
        <div class="grid grid-cols-1 xl:grid-cols-[420px_1fr] gap-4 sm:gap-5">
          <div class="bg-white rounded-lg border border-line shadow-soft p-4 mobile-card">
            <div class="flex items-center justify-between mb-4">
              <h2 class="font-bold text-lg">录入热点</h2>
              <span class="text-xs px-2 py-1 rounded bg-slate-100 text-slate-600">自动评分</span>
            </div>
            <form id="topicForm" class="space-y-4">
              <div>
                <label class="block text-sm font-semibold mb-1" for="topicTitle">热点/选题标题</label>
                <input id="topicTitle" class="w-full h-10 rounded-md border border-line px-3 focus:outline-none focus:ring-2 focus:ring-jade" placeholder="例如：真正的大佬最后登场" required />
              </div>
              <div>
                <label class="block text-sm font-semibold mb-1" for="topicSource">来源链接或备注</label>
                <input id="topicSource" class="w-full h-10 rounded-md border border-line px-3 focus:outline-none focus:ring-2 focus:ring-jade" placeholder="抖音链接、账号名、群内截图编号" />
              </div>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div>
                  <label class="block text-sm font-semibold mb-1" for="topicType">模板类型</label>
                  <select id="topicType" class="w-full h-10 rounded-md border border-line px-3 bg-white focus:outline-none focus:ring-2 focus:ring-jade">
                    <option>变装</option>
                    <option>卡点</option>
                    <option>跳舞</option>
                    <option>热梗台词</option>
                    <option>反应视频</option>
                    <option>Vlog快剪</option>
                  </select>
                </div>
                <div>
                  <label class="block text-sm font-semibold mb-1" for="topicOwner">负责人</label>
                  <input id="topicOwner" class="w-full h-10 rounded-md border border-line px-3 focus:outline-none focus:ring-2 focus:ring-jade" placeholder="姓名" />
                </div>
              </div>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div>
                  <label class="block text-sm font-semibold mb-1" for="topicScene">拍摄场景</label>
                  <select id="topicScene" class="w-full h-10 rounded-md border border-line px-3 bg-white focus:outline-none focus:ring-2 focus:ring-jade">
                    <option>活动室</option>
                    <option>走廊</option>
                    <option>门口</option>
                    <option>餐厅</option>
                    <option>办公室</option>
                    <option>院内户外</option>
                  </select>
                </div>
                <div>
                  <label class="block text-sm font-semibold mb-1" for="elderlyMode">老人参与</label>
                  <select id="elderlyMode" class="w-full h-10 rounded-md border border-line px-3 bg-white focus:outline-none focus:ring-2 focus:ring-jade">
                    <option>压轴出场</option>
                    <option>围观鼓掌</option>
                    <option>一句金句</option>
                    <option>简单摆手</option>
                    <option>不出镜</option>
                  </select>
                </div>
              </div>
              <div>
                <label class="block text-sm font-semibold mb-2">适配判断</label>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-sm">
                  <label class="flex items-center gap-2 p-2 rounded-md border border-line">
                    <input type="checkbox" class="score-check" value="quick" checked />3秒能看懂
                  </label>
                  <label class="flex items-center gap-2 p-2 rounded-md border border-line">
                    <input type="checkbox" class="score-check" value="multi" checked />适合多人卡点
                  </label>
                  <label class="flex items-center gap-2 p-2 rounded-md border border-line">
                    <input type="checkbox" class="score-check" value="scene" checked />能换养老院场景
                  </label>
                  <label class="flex items-center gap-2 p-2 rounded-md border border-line">
                    <input type="checkbox" class="score-check" value="safe" checked />老人可安全参与
                  </label>
                  <label class="flex items-center gap-2 p-2 rounded-md border border-line sm:col-span-2">
                    <input type="checkbox" class="score-check" value="contrast" checked />结尾有反差笑点
                  </label>
                </div>
              </div>
              <div>
                <label class="block text-sm font-semibold mb-1" for="riskLevel">安全风险</label>
                <select id="riskLevel" class="w-full h-10 rounded-md border border-line px-3 bg-white focus:outline-none focus:ring-2 focus:ring-jade">
                  <option>低</option>
                  <option>中</option>
                  <option>高</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-semibold mb-1" for="topicNotes">拍摄备注</label>
                <textarea id="topicNotes" class="w-full min-h-20 rounded-md border border-line px-3 py-2 focus:outline-none focus:ring-2 focus:ring-jade" placeholder="需要的动作、道具、音乐、注意事项"></textarea>
              </div>
              <button class="w-full h-11 rounded-md bg-ink text-white hover:opacity-90 font-semibold" type="submit">
                <i class="fa fa-plus mr-1" aria-hidden="true"></i>加入选题池
              </button>
            </form>
          </div>

          <div class="bg-white rounded-lg border border-line shadow-soft p-4 min-w-0 mobile-card">
            <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between mb-4">
              <h2 class="font-bold text-lg">选题池</h2>
              <div class="flex flex-wrap gap-2">
                <select id="topicFilterType" class="h-9 rounded-md border border-line px-3 bg-white text-sm">
                  <option value="">全部类型</option>
                  <option>变装</option>
                  <option>卡点</option>
                  <option>跳舞</option>
                  <option>热梗台词</option>
                  <option>反应视频</option>
                  <option>Vlog快剪</option>
                </select>
                <select id="topicFilterPriority" class="h-9 rounded-md border border-line px-3 bg-white text-sm">
                  <option value="">全部优先级</option>
                  <option>S</option>
                  <option>A</option>
                  <option>B</option>
                </select>
                <button id="exportTopicsCsvBtn" class="h-9 px-3 rounded-md border border-line bg-white hover:bg-slate-50 text-sm">
                  <i class="fa fa-table mr-1" aria-hidden="true"></i>导出CSV
                </button>
              </div>
            </div>
            <div id="topicList" class="space-y-3"></div>
          </div>
        </div>
      </section>

      <section id="view-analyzer" class="view hidden space-y-5">
        <div class="grid grid-cols-1 xl:grid-cols-[440px_1fr] gap-4 sm:gap-5">
          <div class="bg-white rounded-lg border border-line shadow-soft p-4 mobile-card">
            <div class="flex items-center justify-between mb-4">
              <h2 class="font-bold text-lg">抓取分析助手</h2>
              <span class="text-xs px-2 py-1 rounded bg-slate-100 text-slate-600">合规半自动</span>
            </div>
            <div class="space-y-4">
              <div class="border border-line rounded-lg p-3 bg-mist text-sm leading-6 text-slate-700">
                把抖音搜索结果、同行视频标题、评论区高频问题、创作者中心数据复制到这里，系统会自动识别类型、风险、适配度和优先级。
              </div>
              <div>
                <label class="block text-sm font-semibold mb-1" for="captureInput">粘贴原始内容</label>
                <textarea id="captureInput" class="w-full min-h-56 rounded-md border border-line px-3 py-2 focus:outline-none focus:ring-2 focus:ring-jade" placeholder="例如：从抖音搜索页复制的视频标题、播放/点赞、账号名、发布时间，或评论区用户问题。"></textarea>
              </div>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-sm">
                <label class="flex items-center gap-2 p-2 rounded-md border border-line">
                  <input id="onlyRelatedCheck" type="checkbox" checked />只保留养老/00后相关
                </label>
                <label class="flex items-center gap-2 p-2 rounded-md border border-line">
                  <input id="dedupeCheck" type="checkbox" checked />自动去重
                </label>
              </div>
              <div class="flex flex-wrap gap-2">
                <button id="analyzeCaptureBtn" class="h-10 px-4 rounded-md bg-ink text-white hover:opacity-90 text-sm font-semibold">
                  <i class="fa fa-search mr-1" aria-hidden="true"></i>开始分析
                </button>
                <button id="clearCaptureInputBtn" class="h-10 px-4 rounded-md border border-line bg-white hover:bg-slate-50 text-sm">
                  <i class="fa fa-eraser mr-1" aria-hidden="true"></i>清空输入
                </button>
                <button id="exportCapturesCsvBtn" class="h-10 px-4 rounded-md border border-line bg-white hover:bg-slate-50 text-sm">
                  <i class="fa fa-table mr-1" aria-hidden="true"></i>导出分析
                </button>
              </div>
            </div>
          </div>
          <div class="bg-white rounded-lg border border-line shadow-soft p-4 min-w-0 mobile-card">
            <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between mb-4">
              <h2 class="font-bold text-lg">分析结果</h2>
              <div class="flex flex-wrap gap-2">
                <button id="addTopCapturesBtn" class="h-9 px-3 rounded-md bg-jade text-white hover:opacity-90 text-sm">
                  <i class="fa fa-plus mr-1" aria-hidden="true"></i>高分入池
                </button>
                <button id="clearCapturesBtn" class="h-9 px-3 rounded-md border border-line bg-white hover:bg-slate-50 text-sm">
                  <i class="fa fa-trash-o mr-1" aria-hidden="true"></i>清空结果
                </button>
              </div>
            </div>
            <div id="captureSummary" class="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-4"></div>
            <div id="captureList" class="space-y-3"></div>
          </div>
        </div>
      </section>

      <section id="view-command" class="view hidden space-y-5">
        <div class="grid grid-cols-1 xl:grid-cols-[420px_1fr] gap-4 sm:gap-5">
          <div class="bg-white rounded-lg border border-line shadow-soft p-4 mobile-card">
            <div class="flex items-center gap-3 mb-4">
              <img src="assets/account-avatar.jpg" alt="账号头像" class="w-12 h-12 rounded-xl object-cover avatar-ring shrink-0" />
              <div>
                <h2 class="font-bold text-lg">任务调度台</h2>
                <p class="text-sm text-slate-500">统一定方向、派任务、收数据。</p>
              </div>
            </div>
            <form id="commandForm" class="space-y-4">
              <div>
                <label class="block text-sm font-semibold mb-1" for="commandTask">选择任务</label>
                <select id="commandTask" class="w-full h-10 rounded-md border border-line px-3 bg-white focus:outline-none focus:ring-2 focus:ring-jade"></select>
              </div>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div>
                <label class="block text-sm font-semibold mb-1" for="commandType">任务类型</label>
                  <select id="commandType" class="w-full h-10 rounded-md border border-line px-3 bg-white focus:outline-none focus:ring-2 focus:ring-jade">
                    <option>拍摄任务</option>
                    <option>剪辑任务</option>
                    <option>发布任务</option>
                    <option>数据回传</option>
                    <option>热点追拍</option>
                  </select>
                </div>
                <div>
                  <label class="block text-sm font-semibold mb-1" for="commandDeadline">截止时间</label>
                  <input id="commandDeadline" class="w-full h-10 rounded-md border border-line px-3 focus:outline-none focus:ring-2 focus:ring-jade" placeholder="例如：今天18:00前" />
                </div>
              </div>
              <div>
                <label class="block text-sm font-semibold mb-1" for="commandExtra">补充要求</label>
                <textarea id="commandExtra" class="w-full min-h-20 rounded-md border border-line px-3 py-2 focus:outline-none focus:ring-2 focus:ring-jade" placeholder="例如：老人只做围观鼓掌，封面字用“大佬登场”，剪辑控制在25秒内。"></textarea>
              </div>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                <button class="h-11 rounded-md bg-ink text-white hover:opacity-90 font-semibold" type="submit">
                  <i class="fa fa-bullhorn mr-1" aria-hidden="true"></i>生成群通知
                </button>
                <button id="saveCommandBtn" class="h-11 rounded-md border border-line bg-white hover:bg-slate-50 font-semibold" type="button">
                  <i class="fa fa-save mr-1" aria-hidden="true"></i>保存记录
                </button>
              </div>
            </form>
          </div>
          <div class="space-y-4">
            <div class="bg-white rounded-lg border border-line shadow-soft p-4 min-w-0 mobile-card">
              <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between mb-4">
                <h2 class="font-bold text-lg">群通知文案</h2>
                <div class="flex flex-wrap gap-2">
                  <button id="copyCommandBtn" class="h-9 px-3 rounded-md bg-coral text-white hover:opacity-90 text-sm">
                    <i class="fa fa-copy mr-1" aria-hidden="true"></i>复制通知
                  </button>
                  <button id="clearCommandBtn" class="h-9 px-3 rounded-md border border-line bg-white hover:bg-slate-50 text-sm">
                    <i class="fa fa-eraser mr-1" aria-hidden="true"></i>清空
                  </button>
                </div>
              </div>
              <textarea id="commandOutput" class="w-full min-h-72 rounded-md border border-line px-3 py-3 bg-mist focus:outline-none focus:ring-2 focus:ring-jade text-sm leading-6" placeholder="生成后的群通知会出现在这里。"></textarea>
            </div>
            <div class="bg-white rounded-lg border border-line shadow-soft p-4 mobile-card">
              <div class="flex items-center justify-between mb-3">
                <h2 class="font-bold text-lg">通知记录</h2>
                <button id="clearCommandHistoryBtn" class="h-8 px-3 rounded-md border border-line bg-white hover:bg-slate-50 text-sm">清空记录</button>
              </div>
              <div id="commandHistory" class="space-y-3"></div>
            </div>
          </div>
        </div>
      </section>

      <section id="view-tasks" class="view hidden space-y-5">
        <div class="bg-white rounded-lg border border-line shadow-soft p-4 mobile-card">
          <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between mb-4">
            <h2 class="font-bold text-lg">拍摄任务</h2>
            <div class="flex flex-wrap gap-2">
              <button class="statusQuick h-9 px-3 rounded-md border border-line bg-white hover:bg-slate-50 text-sm" data-status="待拍">待拍</button>
              <button class="statusQuick h-9 px-3 rounded-md border border-line bg-white hover:bg-slate-50 text-sm" data-status="待剪">待剪</button>
              <button class="statusQuick h-9 px-3 rounded-md border border-line bg-white hover:bg-slate-50 text-sm" data-status="待发">待发</button>
              <button class="statusQuick h-9 px-3 rounded-md border border-line bg-white hover:bg-slate-50 text-sm" data-status="已发">已发</button>
            </div>
          </div>
          <div id="taskBoard" class="grid grid-cols-1 lg:grid-cols-4 gap-4"></div>
        </div>
      </section>

      <section id="view-checklist" class="view hidden space-y-5">
        <div class="grid grid-cols-1 xl:grid-cols-[360px_1fr] gap-4 sm:gap-5">
          <div class="bg-white rounded-lg border border-line shadow-soft p-4 mobile-card">
            <div class="flex items-center justify-between mb-4">
              <h2 class="font-bold text-lg">选择任务</h2>
              <span id="selectedTaskBadge" class="text-xs px-2 py-1 rounded bg-slate-100 text-slate-600">未选择</span>
            </div>
            <div id="checkTaskList" class="space-y-2 max-h-[680px] overflow-auto scrollbar-thin"></div>
          </div>
          <div class="bg-white rounded-lg border border-line shadow-soft p-4 mobile-card">
            <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between mb-4">
              <h2 class="font-bold text-lg">发布前检查</h2>
              <button id="markReadyBtn" class="h-9 px-3 rounded-md bg-jade text-white hover:opacity-90 text-sm">
                <i class="fa fa-check mr-1" aria-hidden="true"></i>标记为待发
              </button>
            </div>
            <div id="checklistPanel"></div>
          </div>
        </div>
      </section>

      <section id="view-review" class="view hidden space-y-5">
        <div class="grid grid-cols-1 xl:grid-cols-[420px_1fr] gap-4 sm:gap-5">
          <div class="bg-white rounded-lg border border-line shadow-soft p-4 mobile-card">
            <div class="flex items-center justify-between mb-4">
              <h2 class="font-bold text-lg">录入发布数据</h2>
              <button id="exportReviewsCsvBtn" class="h-9 px-3 rounded-md border border-line bg-white hover:bg-slate-50 text-sm">
                <i class="fa fa-table mr-1" aria-hidden="true"></i>导出CSV
              </button>
            </div>

    const relatedKeywords = ["养老", "养老院", "老年", "老人", "爷爷", "奶奶", "长者", "银发", "护理", "照护", "00后", "曲江", "西安", "探院", "院长"];

    let state = loadState();
    let activeTab = "dashboard";
    let selectedTaskId = null;
    let pendingCommandTaskId = null;

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return getEmptyState();
        const parsed = JSON.parse(raw);
        return {
          topics: parsed.topics || [],
          captures: parsed.captures || [],
          commands: parsed.commands || [],
          tasks: parsed.tasks || [],
          reviews: parsed.reviews || [],
          titleHooks: normalizeTitleHooks(parsed.titleHooks),
          guidelineCards: normalizeGuidelines(parsed.guidelineCards)
        };
      } catch (error) {
        return getEmptyState();
      }
    }

    function cloneDefaults(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function getEmptyState() {
      return {
        topics: [],
        captures: [],
        commands: [],
        tasks: [],
        reviews: [],
        titleHooks: cloneDefaults(defaultTitleHooks),
        guidelineCards: cloneDefaults(defaultGuidelines)
      };
    }

    function normalizeStoredId(value, prefix) {
      const text = String(value || "");
      return /^[A-Za-z0-9_-]+$/.test(text) ? text : uid(prefix);
    }

    function normalizeTitleHooks(value, useDefaultsWhenEmpty = true) {
      if (!Array.isArray(value)) return cloneDefaults(defaultTitleHooks);
      const normalized = value.map(item => {
        if (Array.isArray(item)) {
          return { id: uid("hook"), type: item[0] || "通用", title: item[1] || "" };
        }
        return {
          id: normalizeStoredId(item.id, "hook"),
          type: item.type || "通用",
          title: item.title || item.text || ""
        };
      }).filter(item => item.title);
      return normalized.length || !useDefaultsWhenEmpty ? normalized : cloneDefaults(defaultTitleHooks);
    }

    function normalizeIconName(icon) {
      const text = String(icon || "").trim();
      const match = text.match(/fa-[a-z0-9-]+/i);
      return match ? match[0] : "fa-lightbulb-o";
    }

    function normalizeGuidelines(value, useDefaultsWhenEmpty = true) {
      if (!Array.isArray(value)) return cloneDefaults(defaultGuidelines);
      const normalized = value.map(item => {
        const rawItems = Array.isArray(item.items) ? item.items : String(item.items || "").split(/\n+/);
        return {
          id: normalizeStoredId(item.id, "guide"),
          title: item.title || "新口径",
          icon: normalizeIconName(item.icon),
          color: item.color || "text-jade",
          items: rawItems.map(line => String(line).trim()).filter(Boolean)
        };
      }).filter(item => item.title && item.items.length);
      return normalized.length || !useDefaultsWhenEmpty ? normalized : cloneDefaults(defaultGuidelines);
    }

    function ensureLibraryState() {
      state.titleHooks = Array.isArray(state.titleHooks) ? normalizeTitleHooks(state.titleHooks, false) : cloneDefaults(defaultTitleHooks);
      state.guidelineCards = Array.isArray(state.guidelineCards) ? normalizeGuidelines(state.guidelineCards, false) : cloneDefaults(defaultGuidelines);
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function uid(prefix) {
      return `${prefix}_${Date.now()}_${Math.random().toString(16).slice(2)}`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeJsString(value) {
      return String(value ?? "")
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'")
        .replaceAll("\n", "\\n")
        .replaceAll("\r", "");
    }

    function fmtNumber(value) {
      const n = Number(value || 0);
      if (n >= 10000) return `${(n / 10000).toFixed(n >= 100000 ? 0 : 1)}万`;
      return n.toLocaleString("zh-CN");
    }

    function pct(part, total) {
      const p = Number(part || 0);
      const t = Number(total || 0);
      if (!t) return "0.0%";
      return `${((p / t) * 100).toFixed(1)}%`;
    }

    function getPriority(score) {
      if (score >= 82) return "S";
      if (score >= 62) return "A";
      return "B";
    }

    function scoreTopic(checks, risk, type) {
      const yesCount = Object.values(checks).filter(Boolean).length;
      const typeBonus = ["变装", "卡点", "跳舞"].includes(type) ? 8 : 4;
      const riskPenalty = risk === "高" ? 24 : risk === "中" ? 10 : 0;
      return Math.max(0, Math.min(100, yesCount * 18 + typeBonus - riskPenalty));
    }

    function statusColor(status) {
      return {
        "待拍": "bg-coral",
        "待剪": "bg-sun",
        "待发": "bg-jade",
        "已发": "bg-ink"
      }[status] || "bg-slate-400";
    }

    function toast(message) {
      const el = document.getElementById("toast");
      el.textContent = message;
      el.classList.remove("hidden");
      window.clearTimeout(toast.timer);
      toast.timer = window.setTimeout(() => el.classList.add("hidden"), 1800);
    }

    function renderTabs() {
      const container = document.getElementById("tabs");
      container.innerHTML = visibleTabs().map(tab => `

          <i class="fa ${tab.icon} mr-1" aria-hidden="true"></i>${tab.label}
        </button>
      `).join("");
      container.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          activeTab = btn.dataset.tab;
          render();
        });
      });
    }

    function taskRow(task) {

    function emptyState(text) {
      return `

      const priority = document.getElementById("topicFilterPriority")?.value || "";
      const topics = state.topics
        .filter(item => !type || item.type === type)
        .filter(item => !priority || item.priority === priority)
        .sort((a, b) => b.score - a.score);

      list.innerHTML = topics.length ? topics.map(topic => `
        <article class="border border-line rounded-lg p-3">

            <div class="min-w-0">
              <div class="flex flex-wrap items-center gap-2 mb-2">
                <span class="px-2 py-1 rounded bg-ink text-white text-xs">${escapeHtml(topic.priority)}</span>
                <span class="px-2 py-1 rounded bg-slate-100 text-slate-700 text-xs">${escapeHtml(topic.type)}</span>
                <span class="px-2 py-1 rounded bg-slate-100 text-slate-700 text-xs">评分 ${topic.score}</span>
                <span class="px-2 py-1 rounded bg-slate-100 text-slate-700 text-xs">风险 ${escapeHtml(topic.risk)}</span>
              </div>
              <h3 class="font-bold text-base break-words">${escapeHtml(topic.title)}</h3>
              <p class="text-sm text-slate-600 mt-1">场景：${escapeHtml(topic.scene)} · 老人：${escapeHtml(topic.elderlyMode)} · 负责人：${escapeHtml(topic.owner || "未定")}</p>

            </div>
            <div class="flex flex-wrap gap-2 shrink-0">
              <button class="h-8 px-3 rounded-md bg-jade text-white text-sm" onclick="createTaskFromTopic('${topic.id}')">
                <i class="fa fa-video-camera mr-1" aria-hidden="true"></i>生成任务
              </button>
              <button class="h-8 px-3 rounded-md border border-line text-sm" onclick="deleteTopic('${topic.id}')">
                <i class="fa fa-trash-o mr-1" aria-hidden="true"></i>删除
              </button>
            </div>
          </div>
        </article>
      `).join("") : emptyState("选题池为空，先把今天刷到的热点录进来。");

    function renderAnalyzer() {
      const summary = document.getElementById("captureSummary");
      const list = document.getElementById("captureList");
      const captures = [...state.captures].sort((a, b) => b.score - a.score);
      const sCount = captures.filter(item => item.priority === "S").length;
      const avgScore = captures.length ? Math.round(captures.reduce((sum, item) => sum + item.score, 0) / captures.length) : 0;
      const lowRisk = captures.filter(item => item.risk === "低").length;
      const topType = getTopType(captures);
      summary.innerHTML = [
        ["结果", captures.length],
        ["S级", sCount],
        ["均分", avgScore],
        ["低风险", lowRisk]
      ].map(([label, value]) => `
        <div class="border border-line rounded-lg p-3 bg-mist">
          <div class="text-xs text-slate-500">${label}</div>
          <div class="text-2xl font-bold mt-1">${value}</div>
        </div>
      `).join("") + `
        <div class="sm:col-span-4 border border-line rounded-lg p-3">
          <div class="text-sm text-slate-500">当前最热类型</div>
          <div class="font-bold mt-1">${escapeHtml(topType || "暂无")}</div>
        </div>
      `;
      list.innerHTML = captures.length ? captures.map(item => `
        <article class="border border-line rounded-lg p-3">
          <div class="flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between">
            <div class="min-w-0">
              <div class="flex flex-wrap items-center gap-2 mb-2">
                <span class="px-2 py-1 rounded bg-ink text-white text-xs">${escapeHtml(item.priority)}</span>
                <span class="px-2 py-1 rounded bg-slate-100 text-slate-700 text-xs">${escapeHtml(item.type)}</span>
                <span class="px-2 py-1 rounded bg-slate-100 text-slate-700 text-xs">评分 ${item.score}</span>
                <span class="px-2 py-1 rounded bg-slate-100 text-slate-700 text-xs">风险 ${escapeHtml(item.risk)}</span>
                <span class="px-2 py-1 rounded bg-slate-100 text-slate-700 text-xs">热度 ${escapeHtml(item.heatLabel)}</span>
              </div>
              <h3 class="font-bold text-base break-words">${escapeHtml(item.suggestedTitle)}</h3>
              <p class="text-sm text-slate-600 mt-1">识别来源：${escapeHtml(item.rawTitle)}</p>
              <p class="text-sm text-slate-700 mt-2 bg-mist rounded-md p-2">${escapeHtml(item.reason)}</p>
            </div>
            <div class="flex flex-wrap gap-2 shrink-0">
              <button class="h-8 px-3 rounded-md bg-jade text-white text-sm" onclick="addCaptureToTopic('${item.id}')">
                <i class="fa fa-plus mr-1" aria-hidden="true"></i>入池
              </button>
              <button class="h-8 px-3 rounded-md border border-line text-sm" onclick="copyCaptureTitle('${item.id}')">
                <i class="fa fa-copy mr-1" aria-hidden="true"></i>复制
              </button>
              <button class="h-8 px-3 rounded-md border border-line text-sm" onclick="deleteCapture('${item.id}')">
                <i class="fa fa-trash-o mr-1" aria-hidden="true"></i>删除
              </button>
            </div>
          </div>
        </article>
      `).join("") : emptyState("把抖音搜索结果、同行标题或评论粘贴到左侧，点击开始分析。");
    }

    function renderCommand() {
      const select = document.getElementById("commandTask");
      const tasks = state.tasks.length ? state.tasks : [];
      select.innerHTML = tasks.length
        ? tasks.map(task => `<option value="${task.id}">${escapeHtml(task.status)}｜${escapeHtml(task.title)}</option>`).join("")
        : `<option value="">暂无任务，请先从选题池生成任务</option>`;
      if (pendingCommandTaskId && state.tasks.some(task => task.id === pendingCommandTaskId)) {
        select.value = pendingCommandTaskId;
        pendingCommandTaskId = null;
      }
      const history = document.getElementById("commandHistory");
      const items = [...(state.commands || [])].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 8);
      history.innerHTML = items.length ? items.map(item => `
        <article class="border border-line rounded-lg p-3 bg-mist">
          <div class="flex items-center justify-between gap-2 mb-2">
            <span class="text-xs px-2 py-1 rounded bg-ink text-white">${escapeHtml(item.type)}</span>
            <span class="text-xs text-slate-500">${new Date(item.createdAt).toLocaleString("zh-CN", { hour12: false })}</span>
          </div>
          <div class="text-sm whitespace-pre-line leading-6">${escapeHtml(item.text)}</div>
          <button class="mt-3 h-8 px-3 rounded-md border border-line bg-white text-sm" onclick="copySavedCommand('${item.id}')">
            <i class="fa fa-copy mr-1" aria-hidden="true"></i>复制
          </button>
        </article>
      `).join("") : emptyState("生成并保存群通知后，会在这里形成记录。");
    }

    function renderTasks() {
      const board = document.getElementById("taskBoard");
      const statuses = ["待拍", "待剪", "待发", "已发"];
      board.innerHTML = statuses.map(status => {
        const tasks = state.tasks.filter(task => task.status === status);
        return `
          <div class="border border-line rounded-lg bg-mist min-h-72">
            <div class="p-3 border-b border-line flex items-center justify-between">
              <div class="font-bold"><span class="status-dot ${statusColor(status)} mr-2"></span>${status}</div>
              <span class="text-xs px-2 py-1 rounded bg-white border border-line">${tasks.length}</span>
            </div>
            <div class="p-3 space-y-3">
              ${tasks.length ? tasks.map(taskCard).join("") : `<div class="text-sm text-slate-500 p-3">暂无任务</div>`}
            </div>
          </div>
        `;
      }).join("");
    }

    function taskCard(task) {
      return `
        <article class="bg-white border border-line rounded-lg p-3">
          <div class="flex items-center justify-between gap-2 mb-2">
            <span class="text-xs px-2 py-1 rounded bg-slate-100 text-slate-700">${escapeHtml(task.type)}</span>
            <span class="text-xs text-slate-500">${escapeHtml(task.owner || "未定")}</span>
          </div>
          <h3 class="font-bold leading-snug">${escapeHtml(task.title)}</h3>
          <p class="text-sm text-slate-600 mt-2">${escapeHtml(task.hook)}</p>
          <div class="mt-3 text-xs text-slate-500 leading-5">
            <div>场景：${escapeHtml(task.scene)}</div>
            <div>封面：${escapeHtml(task.cover)}</div>
          </div>
          <div class="mt-3 flex flex-wrap gap-2">
            ${isTeamMode() ? "" : `<button class="h-8 px-3 rounded-md bg-coral text-white text-sm" onclick="openCommandForTask('${task.id}')">派发</button>`}
            <button class="h-8 px-3 rounded-md border border-line text-sm" onclick="advanceTask('${task.id}')">推进</button>
            <button class="h-8 px-3 rounded-md border border-line text-sm" onclick="selectChecklist('${task.id}')">检查</button>
            <button class="h-8 px-3 rounded-md border border-line text-sm" onclick="deleteTask('${task.id}')">删除</button>
          </div>
        </article>
      `;
    }

    function renderChecklist() {
      const list = document.getElementById("checkTaskList");
      const tasks = state.tasks.filter(task => task.status !== "已发");
      if (!selectedTaskId && tasks[0]) selectedTaskId = tasks[0].id;
      const selected = state.tasks.find(task => task.id === selectedTaskId);
      document.getElementById("selectedTaskBadge").textContent = selected ? selected.status : "未选择";
      list.innerHTML = tasks.length ? tasks.map(task => `
        <button class="w-full text-left border rounded-lg p-3 ${task.id === selectedTaskId ? "border-ink bg-slate-50" : "border-line bg-white"}" onclick="selectChecklist('${task.id}', false)">
          <div class="font-bold text-sm">${escapeHtml(task.title)}</div>
          <div class="text-xs text-slate-500 mt-1">${escapeHtml(task.status)} · ${escapeHtml(task.type)}</div>
        </button>
      `).join("") : emptyState("暂无待检查任务。");

      const panel = document.getElementById("checklistPanel");
      if (!selected) {
        panel.innerHTML = emptyState("先在选题池生成一个拍摄任务。");
        return;
      }
      selected.checks = selected.checks || {};
      const done = checklistItems.filter(item => selected.checks[item]).length;
      panel.innerHTML = `
        <div class="mb-4 border border-line rounded-lg p-3 bg-mist">
          <div class="font-bold">${escapeHtml(selected.title)}</div>
          <div class="text-sm text-slate-600 mt-1">${escapeHtml(selected.hook)}</div>
          <div class="mt-3 h-2 bg-white border border-line rounded-full overflow-hidden">
            <div class="h-full bg-jade" style="width:${done / checklistItems.length * 100}%"></div>
          </div>
          <div class="text-xs text-slate-500 mt-1">已完成 ${done}/${checklistItems.length}</div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          ${checklistItems.map(item => `
            <label class="flex items-start gap-3 border border-line rounded-lg p-3">
              <input type="checkbox" class="check-item mt-1" data-item="${escapeHtml(item)}" ${selected.checks[item] ? "checked" : ""} />
              <span class="text-sm">${escapeHtml(item)}</span>
            </label>
          `).join("")}
        </div>
      `;
      panel.querySelectorAll(".check-item").forEach(input => {
        input.addEventListener("change", () => {
          const task = state.tasks.find(item => item.id === selectedTaskId);
          task.checks = task.checks || {};
          task.checks[input.dataset.item] = input.checked;
          saveState();
          renderChecklist();
        });
      });
    }

    function renderReview() {
      const select = document.getElementById("reviewTask");
      const publishedTasks = state.tasks.filter(task => task.status === "已发");
      select.innerHTML = publishedTasks.length
        ? publishedTasks.map(task => `<option value="${task.id}">${escapeHtml(task.title)}</option>`).join("")
        : `<option value="">暂无已发任务</option>`;

      const summary = document.getElementById("reviewSummary");
      const totalPlays = state.reviews.reduce((sum, item) => sum + Number(item.plays || 0), 0);
      const totalLikes = state.reviews.reduce((sum, item) => sum + Number(item.likes || 0), 0);
      const totalComments = state.reviews.reduce((sum, item) => sum + Number(item.comments || 0), 0);
      summary.innerHTML = [
        ["累计播放", fmtNumber(totalPlays)],
        ["平均点赞率", pct(totalLikes, totalPlays)],
        ["平均评论率", pct(totalComments, totalPlays)]
      ].map(([label, value]) => `
        <div class="border border-line rounded-lg p-3">
          <div class="text-xs text-slate-500">${label}</div>
          <div class="text-2xl font-bold mt-1">${value}</div>
        </div>
      `).join("");

      const list = document.getElementById("reviewList");
      const sorted = [...state.reviews].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      list.innerHTML = sorted.length ? sorted.map(review => {
        const task = state.tasks.find(item => item.id === review.taskId);
        const likeRate = Number(review.likes || 0) / Math.max(1, Number(review.plays || 0));
        const commentRate = Number(review.comments || 0) / Math.max(1, Number(review.plays || 0));
        const followRate = Number(review.follows || 0) / Math.max(1, Number(review.plays || 0));
        const verdict = getVerdict(likeRate, commentRate, followRate, review.plays);
        const maxBar = Math.max(1, Number(review.plays || 0));
        return `
          <article class="border border-line rounded-lg p-3">
            <div class="flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between">
              <div class="min-w-0">
                <div class="flex flex-wrap gap-2 mb-2">
                  <span class="px-2 py-1 rounded ${verdict.color} text-xs">${verdict.label}</span>
                  <span class="px-2 py-1 rounded bg-slate-100 text-slate-700 text-xs">${escapeHtml(review.publishTime || "未填时间")}</span>
                </div>
                <h3 class="font-bold">${escapeHtml(task?.title || "已删除任务")}</h3>
                <div class="grid grid-cols-2 md:grid-cols-5 gap-2 mt-3 text-sm">
                  <div>播放 <b>${fmtNumber(review.plays)}</b></div>
                  <div>点赞 <b>${fmtNumber(review.likes)}</b></div>
                  <div>评论 <b>${fmtNumber(review.comments)}</b></div>
                  <div>转发 <b>${fmtNumber(review.shares)}</b></div>
                  <div>涨粉 <b>${fmtNumber(review.follows)}</b></div>
                </div>
                <div class="mt-3 space-y-2">
                  ${metricBar("点赞率", review.likes, maxBar, "bg-coral")}
                  ${metricBar("评论率", review.comments, maxBar, "bg-sun")}
                  ${metricBar("涨粉率", review.follows, maxBar, "bg-jade")}
                </div>
              </div>
              <button class="h-8 px-3 rounded-md border border-line text-sm shrink-0" onclick="deleteReview('${review.id}')">删除</button>
            </div>
          </article>
        `;
      }).join("") : emptyState("发布后录入播放、点赞、评论、涨粉，这里会自动给复盘结论。");
    }

    function metricBar(label, value, total, cls) {
      const width = Math.min(100, Number(value || 0) / total * 100 * 8);
      return `
        <div>
          <div class="flex justify-between text-xs text-slate-500 mb-1">
            <span>${label}</span><span>${pct(value, total)}</span>
          </div>
          <div class="h-2 bg-slate-100 rounded-full overflow-hidden">
            <div class="h-full ${cls}" style="width:${width}%"></div>
          </div>
        </div>
      `;
    }

    function getVerdict(likeRate, commentRate, followRate, plays) {
      if (likeRate >= 0.06 || followRate >= 0.0015) return { label: "值得复刻", color: "bg-jade text-white" };
      if (plays >= 10000 && likeRate < 0.025) return { label: "改开头/封面", color: "bg-sun text-ink" };
      if (commentRate >= 0.004) return { label: "加互动续集", color: "bg-coral text-white" };
      return { label: "继续测试", color: "bg-slate-100 text-slate-700" };
    }

    function renderLibrary() {
      ensureLibraryState();
      const titleBox = document.getElementById("titleLibrary");
      titleBox.innerHTML = state.titleHooks.length ? state.titleHooks.map(item => `
        <article class="border border-line rounded-lg p-3 hover:bg-slate-50">
          <div class="flex items-start gap-3">
            <button class="flex-1 text-left min-w-0" onclick="copyTitleHook('${escapeJsString(item.id)}')" title="点击复制标题">
              <span class="text-xs px-2 py-1 rounded bg-slate-100 text-slate-700 mr-2">${escapeHtml(item.type)}</span>
              <span class="font-semibold break-words">${escapeHtml(item.title)}</span>
            </button>
            <button class="h-8 w-8 rounded-md border border-line bg-white hover:bg-coral hover:text-white shrink-0" onclick="deleteTitleHook('${escapeJsString(item.id)}')" title="删除">
              <i class="fa fa-trash" aria-hidden="true"></i>
            </button>

    function cleanCapturedLine(line) {

    function isRelatedText(text) {
      return relatedKeywords.some(keyword => text.includes(keyword));
    }

    function hasDouyinShare(text) {
      return /douyin\.com|v\.douyin\.com|复制此链接|打开Dou音|打开抖音|抖音搜索|直接观看视频/i.test(text);
    }

    function isGeneralHotText(text) {
      return generalHotKeywords.some(keyword => text.includes(keyword));
    }

    function detectType(text) {
      if (/变装|换装|战袍|转场|斯皮尔伯格/.test(text)) return "变装";
      if (/卡点|压轴|登场|节奏|最后出场|大佬/.test(text)) return "卡点";
      if (/跳舞|舞蹈|舞动|伴舞|潮流舞蹈|演唱会|抽离|BGM|bgm|音乐/.test(text)) return "跳舞";
      if (/反应|围观|第一次看|看我们|评论区/.test(text)) return "反应视频";
      if (/领导|热梗|台词|精神状态|抽象|副本|离谱|拿捏/.test(text)) return "热梗台词";
      return "Vlog快剪";
    }

    function detectRisk(text) {
      if (riskKeywords.some(keyword => text.includes(keyword))) return "高";
      if (/挑战|跳舞|舞蹈|追逐|奔跑/.test(text)) return "中";
      return "低";
    }

    function detectHeat(text) {
      const matches = [...text.matchAll(/(\d+(?:\.\d+)?)(万)?/g)].map(match => {
        const value = Number(match[1]);
        return match[2] ? value * 10000 : value;
      }).filter(value => value >= 10);
      const max = matches.length ? Math.max(...matches) : 0;
      if (max >= 100000) return { value: max, label: "爆" };
      if (max >= 10000) return { value: max, label: "高" };
      if (max >= 1000) return { value: max, label: "中" };
      return { value: max, label: "待测" };
    }

    function detectScene(text) {
      if (/餐厅|吃饭|食堂|饭/.test(text)) return "餐厅";
      if (/门口|进门|打卡/.test(text)) return "门口";
      if (/办公室|领导|同事/.test(text)) return "办公室";
      if (/走廊|查房/.test(text)) return "走廊";
      if (/户外|院子|晒太阳|公园/.test(text)) return "院内户外";
      return "活动室";
    }

    function detectElderlyMode(text) {
      if (/爷爷|奶奶|老人|长者|爸妈|父母/.test(text)) {
        if (/说|问|金句|一句话/.test(text)) return "一句金句";
        if (/看|围观|鼓掌|反应/.test(text)) return "围观鼓掌";
        return "压轴出场";
      }
      return "不出镜";
    }

    function suggestTitle(text, type, meta = {}) {
      const compact = text
        .replace(/https?:\/\/\S+/g, "")
        .replace(/复制此链接.*$/g, "")
        .replace(/#\S+/g, "")
        .replace(/@\S+/g, "")
        .replace(/\s+/g, " ")
        .trim();
      if (/00后|养老院|爷爷|奶奶|老人/.test(compact) && compact.length <= 36) return compact;
      if (meta.generalHot && type === "跳舞") return "把这个舞蹈改成养老院00后版";
      if (meta.generalHot && type === "变装") return "把这个变装改成养老院上班版";
      if (meta.generalHot && type === "卡点") return "把这个卡点改成爷爷奶奶压轴版";
      if (meta.generalHot) return "把这个热点改成养老院00后版";
      if (type === "变装") return "别人变装去蹦迪，我们变装去养老院上班";
      if (type === "卡点") return "真正的大佬，永远最后登场";
      if (type === "跳舞") return "我们只是想跳一下，没想到爷爷奶奶更会玩";
      if (type === "反应视频") return "爷爷奶奶看我们拍视频，反应太真实了";
      if (type === "热梗台词") return "领导让我们拍宣传片，结果拍成这样";
      return "我以为我是来照顾老人，结果被老人治愈了";
    }

    function buildCaptureReason(item) {
      const pieces = [];
      if (item.generalHot) pieces.push("泛热点可养老院化");
      pieces.push(`${item.type}模板`);
      pieces.push(item.heatLabel === "爆" ? "已有爆款信号" : item.heatLabel === "高" ? "热度较高" : "可测试");
      pieces.push(item.risk === "低" ? "安全风险低" : `安全风险${item.risk}`);
      pieces.push(item.elderlyMode === "不出镜" ? "适合先用00后出镜" : `老人可${item.elderlyMode}`);
      return pieces.join("，") + "。";
    }

    function buildCaptureItem(text) {
      const related = isRelatedText(text);
      const share = hasDouyinShare(text);
      const generalHot = !related && (share || isGeneralHotText(text));
      const type = detectType(text);
      const risk = detectRisk(text);
      const heat = detectHeat(text);
      const elderlyMode = detectElderlyMode(text);
      const scene = detectScene(text);
      const coreText = text
        .replace(/https?:\/\/\S+/g, "")
        .replace(/复制此链接.*$/g, "")
        .replace(/\s+/g, " ")
        .trim();
      const checks = {
        quick: coreText.length <= 70 || /3秒|一眼|第一/.test(text),
        multi: ["变装", "卡点", "跳舞"].includes(type),
        scene: related || generalHot || /上班|职场|日常|团队/.test(text),
        safe: risk !== "高",
        contrast: contrastKeywords.some(keyword => text.includes(keyword)) || ["变装", "卡点"].includes(type) || generalHot
      };
      const baseScore = scoreTopic(checks, risk, type);
      const heatBonus = heat.label === "爆" ? 12 : heat.label === "高" ? 8 : heat.label === "中" ? 4 : 0;
      const score = Math.max(0, Math.min(100, baseScore + heatBonus));
      const item = {
        id: uid("capture"),
        createdAt: new Date().toISOString(),
        rawTitle: text || "抖音视频链接（需手动补充标题）",
        suggestedTitle: suggestTitle(text, type, { generalHot, share }),
        type,
        owner: "",
        source: share ? "抖音分享粘贴" : "粘贴分析",
        scene,
        elderlyMode,
        checks,
        risk,
        score,
        priority: getPriority(score),
        heat: heat.value,
        heatLabel: heat.label,
        generalHot,
        reason: ""
      };
      item.reason = buildCaptureReason(item);
      return item;
    }

    function parseCapturedText(raw, options = {}) {
      const onlyRelated = options.onlyRelated !== false;
      const dedupe = options.dedupe !== false;
      const lines = raw
        .split(/\n+/)
        .map(cleanCapturedLine)
        .filter(line => line && !/^\/url:/.test(line))
        .filter(line => !/^https?:\/\//.test(line) || hasDouyinShare(line))
        .filter(line => line.length >= 8 && line.length <= 280);
      const seen = new Set();
      const items = [];
      for (const line of lines) {
        const text = line.replace(/^合集\s*/g, "");
        const keepAsGeneralHot = hasDouyinShare(text) || isGeneralHotText(text);
        if (onlyRelated && !isRelatedText(text) && !keepAsGeneralHot) continue;
        const key = text.replace(/https?:\/\/\S+/g, "").replace(/\d+(?:\.\d+)?万?/g, "").replace(/\s/g, "").slice(0, 40);
        if (dedupe && seen.has(key)) continue;
        seen.add(key);
        items.push(buildCaptureItem(text));
      }
      if (!items.length && hasDouyinShare(raw)) {
        const fallbackText = cleanCapturedLine(raw).slice(0, 280) || "抖音视频链接（需手动补充标题）";
        items.push(buildCaptureItem(fallbackText));
      }
      return items;
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");

      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function exportCsv(rows, filename) {
      const csv = rows.map(row => row.map(value => {
        const text = String(value ?? "");
        return `"${text.replaceAll('"', '""')}"`;
      }).join(",")).join("\n");
      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
      downloadBlob(blob, filename);
    }

    function writeClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text);
      }
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      document.body.appendChild(textarea);
      textarea.select();
      const ok = document.execCommand("copy");
      textarea.remove();
      return ok ? Promise.resolve() : Promise.reject(new Error("copy failed"));
    }

        `截止：${deadline}`,
        `场景：${task.scene || "待定"}`,
        `老人参与：${task.elderlyMode || "按现场安全判断"}`,
        `3秒钩子：${task.hook}`,
        `封面字：${task.cover}`
      ];
      const typeTips = {
        "拍摄任务": [
          "拍摄要求：先选BGM再拍；横竖统一用竖屏；多拍3组备选动作。",
          "安全要求：老人只做围观、挥手、鼓掌或一句话，不做危险动作。",
          "回传内容：原视频素材 + 选中的BGM + 现场问题。"
        ],
        "剪辑任务": [
          "剪辑要求：前3秒必须有反差；平均0.5-1.2秒一剪；字幕短句大字。",
          "节奏要求：卡点落在转身、推门、换装、老人压轴这些动作上。",
          "回传内容：初剪视频 + 封面截图 + 标题备选3条。"
        ],
        "发布任务": [
          "发布要求：标题先用反差句；话题带 #养老院有群00后 #养老院日常 #西安曲江老年公寓。",
          "评论引导：下期想看谁/你以为养老院是什么样/要不要继续拍。",
          "回传内容：发布时间 + 发布链接 + 首小时数据。"
        ],
        "数据回传": [
          "复盘要求：回传播放、点赞、评论、转发、涨粉、最高赞评论。",
          "判断口径：点赞率高就复刻；评论高就做续集；播放高点赞低就改开头/封面。",
          "回传内容：数据截图 + 你认为能优化的一句话。"
        ],
        "热点追拍": [
          "追拍要求：今天就拍，不等完美；先保留热点结构，再换成养老院场景。",
          "核心反差：00后整活在前，爷爷奶奶压轴在后。",
          "回传内容：10秒样片 + 是否能赶今晚发布。"
        ]
      };
      const lines = [...common, ...(typeTips[type] || [])];
      if (extra) lines.push(`补充：${extra}`);
      return lines.join("\n");
    }

    function generateCommandText() {
      const text = buildCommandText();
      if (!text) return toast("请先选择一个任务");
      document.getElementById("commandOutput").value = text;
      toast("群通知已生成");
    }

    function saveCommandText() {
      const text = document.getElementById("commandOutput").value.trim() || buildCommandText();
      if (!text) return toast("暂无可保存的通知");
      const type = document.getElementById("commandType").value;
      state.commands = state.commands || [];
      state.commands.unshift({
        id: uid("command"),
        createdAt: new Date().toISOString(),
        type,
        text
      });
      state.commands = state.commands.slice(0, 30);
      saveState();
      renderCommand();
      toast("通知已保存");
    }

    function copySavedCommand(commandId) {
      const item = (state.commands || []).find(command => command.id === commandId);
      if (!item) return;
      copyText(item.text);
    }

    document.getElementById("topicForm").addEventListener("submit", event => {
      event.preventDefault();
      const topic = readTopicForm();
      if (!topic.title) return;
      state.topics.unshift(topic);
      saveState();
      event.target.reset();
      document.querySelectorAll(".score-check").forEach(input => input.checked = true);
      render();
      toast(`已加入选题池，优先级 ${topic.priority}`);
    });

    document.getElementById("titleHookForm").addEventListener("submit", event => {
      event.preventDefault();
      const type = document.getElementById("titleHookType").value.trim();
      const title = document.getElementById("titleHookText").value.trim();
      if (!title) return toast("请先填写标题");
      addTitleHook(type, title);
      event.target.reset();
    });

    document.getElementById("guidelineForm").addEventListener("submit", event => {
      event.preventDefault();
      const title = document.getElementById("guidelineTitle").value.trim();
      const icon = document.getElementById("guidelineIcon").value.trim();
      const items = document.getElementById("guidelineItems").value
        .split(/\n+/)
        .map(line => line.trim())
        .filter(Boolean);
      if (!title) return toast("请先填写口径标题");
      if (!items.length) return toast("请至少填写一条口径");
      addGuidelineCard(title, icon, items);
      event.target.reset();
    });

    document.getElementById("topicFilterType").addEventListener("change", renderTopics);
    document.getElementById("topicFilterPriority").addEventListener("change", renderTopics);
    document.getElementById("commandForm").addEventListener("submit", event => {
      event.preventDefault();
      generateCommandText();
    });
    document.getElementById("saveCommandBtn").addEventListener("click", saveCommandText);
    document.getElementById("copyCommandBtn").addEventListener("click", () => {
      const text = document.getElementById("commandOutput").value.trim();
      if (!text) return toast("请先生成群通知");
      copyText(text);
    });
    document.getElementById("clearCommandBtn").addEventListener("click", () => {
      document.getElementById("commandOutput").value = "";
      toast("通知区已清空");
    });
    document.getElementById("clearCommandHistoryBtn").addEventListener("click", () => {
      state.commands = [];
      saveState();
      renderCommand();
      toast("通知记录已清空");
    });
    document.getElementById("analyzeCaptureBtn").addEventListener("click", () => {
      const raw = document.getElementById("captureInput").value;
      if (!raw.trim()) return toast("请先粘贴内容");
      const items = parseCapturedText(raw, {
        onlyRelated: document.getElementById("onlyRelatedCheck").checked,
        dedupe: document.getElementById("dedupeCheck").checked
      });
      if (!items.length) return toast("未识别到内容，可取消筛选后再试");
      state.captures = [...items, ...state.captures].slice(0, 200);
      saveState();
      renderAnalyzer();
      toast(`已分析 ${items.length} 条`);
    });
    document.getElementById("clearCaptureInputBtn").addEventListener("click", () => {
      document.getElementById("captureInput").value = "";
      toast("输入已清空");
    });
    document.getElementById("clearCapturesBtn").addEventListener("click", () => {
      state.captures = [];
      saveState();
      renderAnalyzer();
      toast("分析结果已清空");
    });
    document.getElementById("addTopCapturesBtn").addEventListener("click", addTopCapturesToTopics);
    document.getElementById("exportJsonBtn").addEventListener("click", exportJson);
    document.getElementById("copyDailyFlowBtn").addEventListener("click", copyDailyFlow);
    document.getElementById("importJsonInput").addEventListener("change", event => {
      const file = event.target.files?.[0];
      if (file) importJson(file);
      event.target.value = "";
    });
    document.getElementById("seedBtn").addEventListener("click", seedData);
    document.getElementById("exportTopicsCsvBtn").addEventListener("click", () => {
      exportCsv([
        ["标题", "类型", "优先级", "评分", "负责人", "场景", "老人参与", "风险", "来源", "备注"],
        ...state.topics.map(item => [item.title, item.type, item.priority, item.score, item.owner, item.scene, item.elderlyMode, item.risk, item.source, item.notes])
      ], "选题池.csv");
    });
    document.getElementById("exportCapturesCsvBtn").addEventListener("click", () => {
      exportCsv([
        ["建议标题", "原始内容", "类型", "优先级", "评分", "热度", "风险", "场景", "老人参与", "分析理由"],
        ...state.captures.map(item => [item.suggestedTitle, item.rawTitle, item.type, item.priority, item.score, item.heatLabel, item.risk, item.scene, item.elderlyMode, item.reason])
      ], "抓取分析结果.csv");
    });
    document.getElementById("exportReviewsCsvBtn").addEventListener("click", () => {
      exportCsv([
        ["标题", "发布时间", "播放", "点赞", "评论", "转发", "涨粉", "点赞率", "评论率", "涨粉率"],
        ...state.reviews.map(item => {
          const task = state.tasks.find(task => task.id === item.taskId);
          return [task?.title || "已删除任务", item.publishTime, item.plays, item.likes, item.comments, item.shares, item.follows, pct(item.likes, item.plays), pct(item.comments, item.plays), pct(item.follows, item.plays)];
        })
      ], "数据复盘.csv");
    });

    document.getElementById("markReadyBtn").addEventListener("click", () => {
      if (!selectedTaskId) return toast("请先选择任务");
      setTaskStatus(selectedTaskId, "待发");
    });

    document.querySelectorAll(".statusQuick").forEach(button => {
      button.addEventListener("click", () => toast(`可在任务卡片中推进到${button.dataset.status}`));
    });

    document.getElementById("mobileQuickAdd").addEventListener("click", () => {
      activeTab = isTeamMode() ? "tasks" : "analyzer";
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    document.getElementById("reviewForm").addEventListener("submit", event => {
      event.preventDefault();
      const taskId = document.getElementById("reviewTask").value;
      if (!taskId) return toast("暂无已发任务可复盘");
      const existingIndex = state.reviews.findIndex(item => item.taskId === taskId);
      const review = {
        id: existingIndex >= 0 ? state.reviews[existingIndex].id : uid("review"),
        taskId,
        createdAt: new Date().toISOString(),
        publishTime: document.getElementById("publishTime").value.trim(),
        plays: Number(document.getElementById("playCount").value || 0),
        likes: Number(document.getElementById("likeCount").value || 0),
        comments: Number(document.getElementById("commentCount").value || 0),
        shares: Number(document.getElementById("shareCount").value || 0),
        follows: Number(document.getElementById("followCount").value || 0)
      };
      if (existingIndex >= 0) state.reviews[existingIndex] = review;
      else state.reviews.unshift(review);
      saveState();
      event.target.reset();
      render();
      toast("复盘已保存");
    });

    window.setTab = setTab;
    window.createTaskFromTopic = createTaskFromTopic;
    window.addCaptureToTopic = addCaptureToTopic;
    window.deleteCapture = deleteCapture;
    window.copyCaptureTitle = copyCaptureTitle;
    window.deleteTopic = deleteTopic;
    window.deleteTask = deleteTask;
    window.deleteReview = deleteReview;
    window.advanceTask = advanceTask;
    window.selectChecklist = selectChecklist;
    window.openCommandForTask = openCommandForTask;
    window.copyText = copyText;
    window.copyDailyFlow = copyDailyFlow;
    window.copySavedCommand = copySavedCommand;
    window.copyTitleHook = copyTitleHook;
    window.deleteTitleHook = deleteTitleHook;
    window.deleteGuidelineCard = deleteGuidelineCard;

    document.addEventListener("keydown", event => {
      if (!(event.metaKey || event.ctrlKey)) return;
      const index = Number(event.key) - 1;
      if (index >= 0 && index < tabs.length) {
        event.preventDefault();
        activeTab = tabs[index].id;
        render();
      }
      if (event.key.toLowerCase() === "e") {
        event.preventDefault();
        exportJson();
      }
    });

    render();
  </script>
</body>
</html>
